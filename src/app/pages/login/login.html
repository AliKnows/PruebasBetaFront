<div class="min-h-screen login-bg flex items-center justify-center p-4 sm:p-6 lg:p-8 font-sans">
  <!-- Overlay for darker contrast if the image is too bright -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]"></div>

  <div class="relative w-full max-w-md animate-in fade-in zoom-in duration-500">
    <!-- Card Glassmorphism -->
    <div class="glass-container p-8 sm:p-10 rounded-[2rem] text-white">
      
      <!-- Logo & Header -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center mb-4">
          <img src="assets/img/AYKlogo.png" alt="Logo" class="h-20 w-auto object-contain">
        </div>
        <h2 class="text-3xl font-black tracking-tighter uppercase">enterprise<span class="text-reddit-blue">OS</span></h2>
        <p class="text-white/70 text-xs font-medium mt-2 tracking-widest uppercase">Portal de Autenticación Seguro</p>
      </div>

      <!-- Error Message Glass Style -->
      <div *ngIf="errorMessage()" class="mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-2xl backdrop-blur-md animate-shake">
        <p class="text-xs font-bold text-red-200 text-center">{{ errorMessage() }}</p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-[10px] font-black text-white/50 uppercase mb-2 ml-1 tracking-[0.2em]">Correo Electrónico</label>
          <div class="relative group">
            <input type="email" name="email" [(ngModel)]="loginData.email" required
                   placeholder="ejemplo@empresa.com"
                   class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-3.5 text-sm text-white placeholder:text-white/20 focus:outline-none focus:bg-white/20 focus:border-white/40 transition-all">
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-black text-white/50 uppercase mb-2 ml-1 tracking-[0.2em]">Contraseña</label>
          <div class="relative group">
            <input type="password" name="password" [(ngModel)]="loginData.password" required
                   placeholder="••••••••"
                   class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-3.5 text-sm text-white placeholder:text-white/20 focus:outline-none focus:bg-white/20 focus:border-white/40 transition-all">
          </div>
        </div>

        <div class="flex items-center justify-between px-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" name="remember" [(ngModel)]="loginData.rememberMe"
                   class="w-4 h-4 rounded border-white/20 bg-white/10 text-reddit-blue focus:ring-0 focus:ring-offset-0 transition-all">
            <span class="text-[10px] font-bold text-white/60 group-hover:text-white transition-colors">RECORDARME</span>
          </label>
          <a href="#" class="text-[10px] font-bold text-reddit-blue hover:text-white transition-colors">¿SOPORTE?</a>
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="isLoading()"
                  class="w-full py-4 bg-reddit-blue hover:bg-reddit-blue/90 disabled:bg-white/10 text-white rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-reddit-blue/20 transition-all active:scale-[0.98] flex justify-center items-center gap-3">
            <span *ngIf="!isLoading()">INICIAR SESIÓN</span>
            <span *ngIf="isLoading()" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              AUTORIZANDO...
            </span>
          </button>
        </div>
      </form>

      <div class="mt-10 pt-6 border-t border-white/10 text-center">
        <p class="text-[9px] font-bold text-white/40 uppercase tracking-widest">
          Developed by Ali Astete Romero v1.0.1
        </p>
      </div>
    </div>
  </div>
</div>
