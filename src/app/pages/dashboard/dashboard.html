<div class="min-h-screen bg-slate-100 flex">
  <!-- Sidebar -->
  <aside 
    [class.w-64]="isSidebarOpen()" 
    [class.w-20]="!isSidebarOpen()"
    class="bg-slate-900 text-white transition-all duration-300 ease-in-out flex flex-col shadow-xl z-20">
    
    <div class="p-6 flex items-center justify-between">
      <div class="flex items-center gap-3 overflow-hidden" *ngIf="isSidebarOpen()">
        <div class="bg-indigo-600 p-1.5 rounded-lg shrink-0">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="font-bold text-lg whitespace-nowrap">ASROSOFT</span>
      </div>
      <button (click)="toggleSidebar()" class="p-1 hover:bg-slate-800 rounded transition-colors">
        <svg class="h-6 w-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <nav class="flex-1 mt-4 px-3 space-y-2">
      <a *ngFor="let item of menuItems" 
         [routerLink]="['/dashboard', item.path]"
         routerLinkActive="bg-indigo-600 text-white"
         [routerLinkActiveOptions]="{exact: false}"
         class="flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all group">
        <div class="shrink-0">
          <!-- Icon placeholder based on label -->
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
        </div>
        <span class="ml-4 font-medium transition-opacity duration-200" 
              [class.opacity-0]="!isSidebarOpen()" 
              [class.w-0]="!isSidebarOpen()">
          {{ item.label }}
        </span>
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <button (click)="logout()" class="w-full flex items-center p-3 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-all group">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="ml-4 font-medium" *ngIf="isSidebarOpen()">Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden">
    <!-- Topbar -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8 shrink-0 shadow-sm">
      <div class="flex items-center gap-4">
        <h1 class="text-xl font-bold text-slate-800">ASROSOFT <span class="text-indigo-600 font-medium">Panel</span></h1>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="p-2 text-slate-400 hover:text-slate-600 relative transition-colors">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span class="absolute top-2 right-2.5 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
        </button>
        <div class="h-8 w-px bg-slate-200 mx-2"></div>
        <div class="flex items-center gap-3">
          <div class="text-right">
            <p class="text-sm font-bold text-slate-800 leading-none">{{ userName() }}</p>
            <p class="text-xs text-slate-500 mt-1">Administrador</p>
          </div>
          <div class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border-2 border-indigo-200">
            {{ userName().charAt(0).toUpperCase() }}
          </div>
        </div>
      </div>
    </header>

    <!-- Page Body -->
    <main class="flex-1 overflow-y-auto p-8 bg-slate-50">
      <router-outlet />
    </main>
  </div>
</div>
