<div class="min-h-screen bg-reddit-bg flex">
  <!-- Sidebar -->
  <aside 
    [class.w-64]="isSidebarOpen()" 
    [class.w-20]="!isSidebarOpen()"
    class="bg-white text-reddit-text transition-all duration-200 ease-in-out flex flex-col border-r border-reddit-border z-20">
    
    <div class="h-12 px-5 flex items-center gap-2 border-b border-reddit-border">
      <div class="shrink-0">
        <img src="assets/img/AYKlogo.png" alt="Logo" class="h-8 w-auto object-contain">
      </div>
      <span class="font-bold text-lg tracking-tight" *ngIf="isSidebarOpen()">Astete<span class="text-reddit-blue">OS</span></span>
    </div>

    <nav class="flex-1 mt-4 px-2 space-y-1">
      <p class="px-4 py-2 text-[10px] font-bold text-reddit-gray uppercase tracking-widest" *ngIf="isSidebarOpen()">Feeds</p>
      <a *ngFor="let item of menuItems" 
         [routerLink]="['/dashboard', item.path]"
         routerLinkActive="bg-reddit-bg text-reddit-blue font-semibold"
         [routerLinkActiveOptions]="{exact: false}"
         class="flex items-center p-3 rounded-md text-[#1A1A1B] hover:bg-reddit-bg transition-colors group">
        <div class="shrink-0 text-reddit-gray group-hover:text-reddit-blue">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
        </div>
        <span class="ml-4 text-sm transition-opacity duration-200" 
              [class.opacity-0]="!isSidebarOpen()" 
              [class.w-0]="!isSidebarOpen()">
          {{ item.label }}
        </span>
      </a>
    </nav>

    <div class="p-4 border-t border-reddit-border">
      <button (click)="logout()" class="w-full flex items-center p-2 text-reddit-gray hover:text-reddit-orange hover:bg-reddit-orange/5 rounded-md transition-all">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="ml-4 text-sm font-medium" *ngIf="isSidebarOpen()">Log Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden global-bg relative">
    <!-- Overlay for global background readability -->
    <div class="absolute inset-0 bg-white/40 backdrop-blur-[1px]"></div>

    <!-- Topbar -->
    <header class="bg-white/80 backdrop-blur-md border-b border-reddit-border h-12 flex items-center justify-between px-5 shrink-0 relative z-10">
      <div class="flex items-center gap-4 flex-1 max-w-2xl">
        <button (click)="toggleSidebar()" class="p-1 hover:bg-reddit-bg rounded text-reddit-gray">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div class="relative w-full">
          <input type="text" placeholder="Buscar en AsteteOS..." class="w-full bg-white/50 border border-reddit-border rounded-full px-10 py-1 text-xs focus:bg-white focus:border-reddit-blue focus:outline-none">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-reddit-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
      
      <div class="flex items-center gap-4 ml-4">
        <div class="flex items-center gap-2 p-1.5 hover:bg-white/50 rounded-md cursor-pointer transition-colors">
          <div class="h-6 w-6 rounded bg-reddit-blue flex items-center justify-center text-[10px] text-white font-bold">
            {{ userName().charAt(0).toUpperCase() }}
          </div>
          <div class="hidden lg:block">
            <p class="text-[11px] font-bold text-reddit-text leading-none">{{ userName() }}</p>
            <p class="text-[9px] text-reddit-gray mt-0.5">Administrator</p>
          </div>
          <svg class="h-4 w-4 text-reddit-gray" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>
    </header>

    <!-- Page Body -->
    <main class="flex-1 overflow-y-auto p-5 relative z-10">
      <div class="max-w-6xl mx-auto">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
